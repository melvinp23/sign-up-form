<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign-up Form</title>
        <link rel="stylesheet" href="style.css">
        <script src="script.js" defer></script>
    </head>

    <body>

        <div class="image-container">
            <div class="logo-section">
                *STACK
            </div>

            <img src="../images/background.jpg" alt="background picture of a balcony">

            <div class="credit-text">Photo by <a
                    href="https://unsplash.com/@charamelon?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Ben
                    Kim</a> on <a
                    href="https://unsplash.com/photos/rows-of-balconies-on-a-blue-tiled-building-exterior-ByWeKskL3dY?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </div>
        </div>

        <div class="main-container">
            <div class="text-header">
                *Stack™ helps businesses launch, automate,
                and scale their online
                services with ease. It powers modern online services with simple tools for growth and
                automation.
            </div>

            <div class="form-container">
                <h3>Sign in to your account.</h3>
                <form action="" method="post">
                    <fieldset>

                        <div class="contact-container">
                            <label for="mail">
                                EMAIL ADDRESS
                                <input type="email" id="mail" name="user_email" required />
                            </label>

                            <label for="pass">
                                PASSWORD
                                <input type="password" id="password" name="password" minlength="8" required />
                            </label>
                        </div>


                        <div class="button-container">
                            <button type="submit">Sign-in</button>
                        </div>
                    </fieldset>
                </form>
            </div>

            <div class="sign-in-container">
                Don't have an account? <a href="../index.html" rel="noopener noreferrer">Sign
                    up</a>
            </div>
        </div>

    </body>

</html>
