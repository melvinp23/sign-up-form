<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign-up Form</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

        <div class="image-container">
            <div class="logo-section">
                *STACK
            </div>

            <img src="./images/background.jpg" alt="background picture of a balcony">

            <div class="credit-text">Photo by <a
                    href="https://unsplash.com/@charamelon?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Ben
                    Kim</a> on <a
                    href="https://unsplash.com/photos/rows-of-balconies-on-a-blue-tiled-building-exterior-ByWeKskL3dY?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
            </div>
        </div>

        <div class="main-container">
            <div class="text-header">
                *Stack™ helps businesses launch, automate,
                and scale their online
                services with ease. It helps to power modern online services with simple tools for growth and
                automation.
            </div>

            <div class="form-container">
                <h3>Sign up to get started.</h3>
                <form action="" method="post">
                    <fieldset>
                        <div class="name-container">
                            <label for="first-name">
                                FIRST NAME
                                <input type="text" id="first-name" name="first-name" />
                            </label>

                            <label for="last-name">
                                LAST NAME
                                <input type="text" id="last-name" name="last-name" />
                            </label>
                        </div>

                        <div class="contact-container">
                            <label for="mail">
                                EMAIL ADDRESS
                                <input type="email" id="mail" name="user_email" />
                            </label>

                            <label for="tel">
                                PHONE NUMBER
                                <input type="tel" id="tel" name="tel" />
                            </label>
                        </div>

                        <div class="password-container">
                            <label for="pass">
                                PASSWORD
                                <input type="password" id="pass" name="password" minlength="8">
                            </label>

                            <label for="confirm-pass">
                                CONFIRM PASSWORD
                                <input type="password" id="confirm-pass" name="password" minlength="8">
                            </label>
                        </div>

                        <div class="button-container">
                            <button type="submit">Create Account</button>
                        </div>
                    </fieldset>
                </form>
            </div>

            <div class="sign-in-container">
                Already have an account? <a href="http://example.com" target="_blank" rel="noopener noreferrer">Sign
                    in</a>
            </div>
        </div>

    </body>

</html>
